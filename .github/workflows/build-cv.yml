name: Build CV PDF

on:
  push:
    paths:
      - README.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex fonts-liberation

      - name: Build PDF
        run: |
          pandoc README.md -o david-tsofin-cv.pdf \
          --pdf-engine=xelatex \
          -V mainfont="Liberation Sans" \
          -V geometry:margin=0.8in \
          -V fontsize=11pt \
          -V colorlinks=true

      - name: Commit PDF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add david-tsofin-cv.pdf
          git commit -m "Update CV PDF" || echo "No changes"
          git push
